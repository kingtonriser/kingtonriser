<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;700;900&family=Space+Grotesk:wght@400;700&display=swap');
      .title {
        font-family: 'Rajdhani', sans-serif;
        font-weight: 900;
        fill: url(#text-grad);
        font-size: 48px;
        letter-spacing: 2px;
      }
      .subtitle {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        fill: #e4e4e7;
        font-size: 14px;
        letter-spacing: 5px;
        text-transform: uppercase;
      }
      .slogan {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 400;
        fill: #a1a1aa;
        font-size: 14px;
        letter-spacing: 0.5px;
      }
      .tag {
        font-family: 'Rajdhani', sans-serif;
        font-size: 11px;
        fill: #f4f4f5;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .border-glow {
        stroke: url(#border-grad);
        stroke-width: 1.5;
        fill: none;
      }
    </style>
    
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
    
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f4f4f5" />
      <stop offset="100%" stop-color="#a1a1aa" />
    </linearGradient>

    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f4f5" opacity="0.8"/>
      <stop offset="50%" stop-color="#e4e4e7" opacity="0.3"/>
      <stop offset="100%" stop-color="#a1a1aa" opacity="0.8"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="16" />
  
  <!-- Subtle Grid Pattern -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.03">
    <line x1="50" y1="0" x2="50" y2="300" />
    <line x1="100" y1="0" x2="100" y2="300" />
    <line x1="150" y1="0" x2="150" y2="300" />
    <line x1="200" y1="0" x2="200" y2="300" />
    <line x1="250" y1="0" x2="250" y2="300" />
    <line x1="300" y1="0" x2="300" y2="300" />
    <line x1="350" y1="0" x2="350" y2="300" />
    <line x1="400" y1="0" x2="400" y2="300" />
    <line x1="450" y1="0" x2="450" y2="300" />
    <line x1="500" y1="0" x2="500" y2="300" />
    <line x1="550" y1="0" x2="550" y2="300" />
    <line x1="600" y1="0" x2="600" y2="300" />
    <line x1="650" y1="0" x2="650" y2="300" />
    <line x1="700" y1="0" x2="700" y2="300" />
    <line x1="750" y1="0" x2="750" y2="300" />
    
    <line x1="0" y1="50" x2="800" y2="50" />
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="150" x2="800" y2="150" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="250" x2="800" y2="250" />
  </g>

  
        <!-- Crypto Hexagons -->
        <g stroke="#a1a1aa" stroke-width="0.5" fill="none" opacity="0.15">
          <polygon points="120,50 150,67 150,103 120,120 90,103 90,67" />
          <polygon points="120,50 120,120" />
          <polygon points="90,67 150,103" />
          <polygon points="150,67 90,103" />
          <circle cx="120" cy="85" r="4" fill="#f4f4f5" opacity="0.7"/>
          
          <polygon points="700,180 730,197 730,233 700,250 670,233 670,197" />
          <polygon points="700,180 700,250" />
          <circle cx="700" cy="215" r="4" fill="#e4e4e7" opacity="0.7"/>
        </g>
        
        <!-- Content Creation Editorial Lines -->
        <g fill="#a1a1aa" opacity="0.1">
          <rect x="50" y="40" width="100" height="4" rx="2" />
          <rect x="50" y="52" width="150" height="4" rx="2" />
          <rect x="50" y="64" width="80" height="4" rx="2" />
          
          <rect x="600" y="240" width="150" height="4" rx="2" fill="#e4e4e7"/>
          <rect x="650" y="252" width="100" height="4" rx="2" fill="#f4f4f5"/>
        </g>
        

  <!-- Glow Effect behind Username -->
  <text x="400" y="135" text-anchor="middle" class="title" opacity="0.3" filter="url(#glow)">kingtonriser</text>

  <!-- Content -->
  <g transform="translate(0, 0)">
    <!-- Tech Tags at top -->
    <g transform="translate(400, 55)" text-anchor="middle">
      <rect x="-180" y="-12" width="110" height="20" rx="10" fill="#18181b" stroke="#f4f4f5" stroke-width="0.5" opacity="0.6"/>
      <text x="-125" y="2" text-anchor="middle" class="tag">WEB3</text>
      
      <rect x="70" y="-12" width="110" height="20" rx="10" fill="#18181b" stroke="#a1a1aa" stroke-width="0.5" opacity="0.6"/>
      <text x="125" y="2" text-anchor="middle" class="tag">CONTENT</text>
    </g>

    <!-- Main Title (Username) -->
    <text x="400" y="135" text-anchor="middle" class="title">kingtonriser</text>
    
    <!-- Subtitle (Tracks) -->
    <text x="400" y="180" text-anchor="middle" class="subtitle">WEB3 AND CRYPTO // CONTENT CREATION & CONTENT WRITING</text>
    
    <!-- Slogan / Bio -->
    <text x="400" y="225" text-anchor="middle" class="slogan">Securing states on the global ledger. Zero-knowledge explorer.</text>
  </g>

  <!-- Glowing Border -->
  <rect x="4" y="4" width="792" height="292" rx="12" class="border-glow" />
</svg>
